name: parity_agent
system_prompt: |
  You are running a cross-framework compatibility test.
  Keep outputs concise and deterministic.
tool_call_mode: openai
max_context_tokens: 12000
max_iterations: 8
retry_attempts: 1
timeout: 20
llm_config:
  model: mock-model
  base_url: http://127.0.0.1:18080
  api_key: mock-key
  api_type: openai_chat_completion
  stream: false
tools:
  - name: list_directory
    yaml_path: ../tools/list_directory.tool.yaml
    binding: nexau.archs.tool.builtin.file_tools:list_directory
  - name: read_file
    yaml_path: ../tools/read_file.tool.yaml
    binding: nexau.archs.tool.builtin.file_tools:read_file
  - name: save_memory
    yaml_path: ../tools/save_memory.tool.yaml
    binding: nexau.archs.tool.builtin.session_tools:save_memory
    as_skill: true
skills:
  - ../skills/refactor-checklist
